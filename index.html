<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Data Import</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: Arial, sans-serif;
}
</style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="bg-white shadow-2xl rounded-2xl w-full max-w-xl p-8">

    <h1 class="text-3xl font-bold text-center text-blue-700 mb-8">
        מערכת משיכת נתוני מניה
    </h1>

    <form id="stockForm" class="space-y-5">

        <div>
            <label class="block mb-2 font-semibold">Ticker</label>
            <input
                type="text"
                id="ticker"
                placeholder="לדוגמה: AAPL"
                class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required>
        </div>

        <div>
            <label class="block mb-2 font-semibold">תאריך התחלה</label>
            <input
                type="date"
                id="startDate"
                class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required>
        </div>

        <div>
            <label class="block mb-2 font-semibold">תאריך סיום</label>
            <input
                type="date"
                id="endDate"
                class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required>
        </div>

        <button
            type="submit"
            id="submitBtn"
            class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">
            משוך נתונים
        </button>

    </form>

    <div id="result" class="mt-6 text-center font-semibold"></div>

</div>

<script>
const form = document.getElementById("stockForm");
const resultDiv = document.getElementById("result");
const btn = document.getElementById("submitBtn");

const YOUR_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwlq7mLj4-fndEfV6nGdN9eSQtgjHjPQWHfTtm2DmnXbLUnXmGa_HI8-4XXm0ktK047/exec";

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const ticker = document.getElementById("ticker").value.trim().toUpperCase();
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;

    if (!ticker || !startDate || !endDate) {
        resultDiv.innerHTML = "<span class='text-red-600'>יש למלא את כל השדות</span>";
        return;
    }

    btn.disabled = true;
    btn.innerText = "טוען נתונים...";
    resultDiv.innerHTML = "<span class='text-blue-600'>שולח בקשה...</span>";

    try {
        await fetch(YOUR_WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                ticker: ticker,
                startDate: startDate,
                endDate: endDate
            })
        });

        resultDiv.innerHTML =
            `<span class='text-green-600'>
            הבקשה נשלחה בהצלחה.
            <br>
            בדוק אם הנתונים נוספו לגיליון בשם ${ticker}
            </span>`;

    } catch (error) {
        resultDiv.innerHTML =
            `<span class='text-red-600'>
            שגיאת חיבור לשרת
            </span>`;
    }

    btn.disabled = false;
    btn.innerText = "משוך נתונים";
});
</script>

</body>
</html>
