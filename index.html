<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Data Import</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="bg-white shadow-2xl rounded-2xl w-full max-w-xl p-8">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-8">
מערכת משיכת נתוני מניה
</h1>

<form id="stockForm" class="space-y-5">

<label class="block font-semibold">Ticker</label>
<input type="text" id="ticker" placeholder="לדוגמה: AAPL"
class="w-full border rounded-xl p-3" required>

<label class="block font-semibold">תאריך התחלה</label>
<input type="date" id="startDate"
class="w-full border rounded-xl p-3" required>

<label class="block font-semibold">תאריך סיום</label>
<input type="date" id="endDate"
class="w-full border rounded-xl p-3" required>

<button type="submit" id="submitBtn"
class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">
משוך נתונים
</button>

</form>

<div id="result" class="mt-6 text-center font-semibold"></div>

</div>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<form id="hiddenPostForm"
      action="https://script.google.com/macros/s/AKfycbwlq7mLj4-fndEfV6nGdN9eSQtgjHjPQWHfTtm2DmnXbLUnXmGa_HI8-4XXm0ktK047/exec"
      method="POST"
      target="hiddenFrame"
      style="display:none;">
      
<input type="hidden" name="ticker" id="hiddenTicker">
<input type="hidden" name="startDate" id="hiddenStartDate">
<input type="hidden" name="endDate" id="hiddenEndDate">

</form>

<script>
const form = document.getElementById("stockForm");
const hiddenForm = document.getElementById("hiddenPostForm");
const resultDiv = document.getElementById("result");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const ticker = document.getElementById("ticker").value.trim().toUpperCase();
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;

    if (!ticker || !startDate || !endDate) {
        resultDiv.innerHTML = "<span class='text-red-600'>יש למלא את כל השדות</span>";
        return;
    }

    document.getElementById("hiddenTicker").value = ticker;
    document.getElementById("hiddenStartDate").value = startDate;
    document.getElementById("hiddenEndDate").value = endDate;

    btn.disabled = true;
    btn.innerText = "שולח בקשה...";
    resultDiv.innerHTML = "<span class='text-blue-600'>הבקשה נשלחת...</span>";

    hiddenForm.submit();

    setTimeout(function() {
        resultDiv.innerHTML =
            `<span class='text-green-600'>
            הבקשה נשלחה.
            <br>
            בדוק בגוגל שיטס אם נוצר גיליון בשם ${ticker}
            </span>`;

        btn.disabled = false;
        btn.innerText = "משוך נתונים";
    }, 2500);
});
</script>

</body>
</html>
